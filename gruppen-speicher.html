<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ULMIPOINT Gruppen-Speicher & Verlauf</title>
<style>
:root{--text:#172033;--muted:#667085;--line:#d9e2ef;--blue:#2563eb;--green:#0f8a5f;--red:#c73636;--warn:#9a6700;--shadow:0 12px 30px rgba(16,24,40,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#edf5ff,#fff 55%,#f6f8fc);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}main{max-width:1220px;margin:auto;padding:18px}.card,.audit{background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:26px;padding:16px;margin-bottom:14px}.eyebrow{display:inline-flex;border:1px solid #c9dcff;background:#f7fbff;color:#175cd3;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;margin-bottom:10px}h1{font-size:clamp(32px,5vw,56px);line-height:.95;letter-spacing:-.07em;margin:0 0 8px}h2{font-size:24px;letter-spacing:-.05em;margin:0 0 8px}p{color:var(--muted);font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:10px 14px;font-weight:950;cursor:pointer}button.primary{background:var(--blue);border-color:var(--blue);color:#fff}.notice{border:1px solid #c9dcff;background:#f7fbff;color:#175cd3;border-radius:16px;padding:10px;margin:12px 0;font-size:13px;font-weight:850;white-space:pre-wrap}.notice.ok{border-color:#b7e4ca;background:#e7f7ef;color:var(--green)}.notice.bad{border-color:#f2a3a3;background:#fffafa;color:var(--red)}.notice.warn{border-color:#f3d28f;background:#fffdf5;color:var(--warn)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px}.site{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:var(--shadow)}.site h2{font-size:23px}.meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.pill{display:inline-flex;border:1px solid var(--line);background:#fbfcfe;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;color:#475467}.pill.ok{background:#e7f7ef;color:var(--green);border-color:#b7e4ca}.pill.warn{background:#fff7e6;color:#9a6700;border-color:#f3d28f}.unit{border:1px solid #edf1f6;background:#fbfcfe;border-radius:18px;padding:10px;margin-top:8px}.unit-title{font-weight:950}.unit-sub{font-size:11px;color:var(--muted);font-weight:850;margin-top:2px}.section-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:8px}.sec{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px;font-size:11px;font-weight:900;min-height:105px;line-height:1.35}.sec b{display:block;font-size:12px;margin-bottom:3px}.sec.ok{border-color:#b7e4ca;background:#f7fff9}.sec.empty{opacity:.78}.sec.bad{border-color:#f2a3a3;background:#fffafa;color:var(--red)}.who{font-size:10px;color:#475467;margin-top:5px;font-weight:850}.history-list{border:1px solid var(--line);border-radius:16px;background:#fff;overflow:auto;max-height:420px;margin-top:8px}.history-row{display:grid;grid-template-columns:170px 1fr auto;gap:8px;align-items:start;padding:10px;border-bottom:1px solid #edf1f6;font-size:12px;font-weight:850}.history-row:last-child{border-bottom:0}.history-time{color:#475467}.history-meta{color:#667085;font-size:11px;margin-top:2px}.chip{border-radius:999px;background:#eef2f7;color:#475467;padding:3px 7px;font-size:10px;font-weight:950}pre{white-space:pre-wrap;background:#111827;color:#fff;border-radius:16px;padding:12px;overflow:auto;max-height:320px}@media(max-width:720px){main{padding:10px}.section-grid{grid-template-columns:1fr}.history-row{grid-template-columns:1fr}}
</style></head><body><main>
<section class="card"><div class="eyebrow">ULMIPOINT Speicherprüfung</div><h1>Gruppen-Speicher</h1><p>Zeigt pro Haus, Gruppe und Speicherbereich, wann und von wem zuletzt bearbeitet wurde.</p><div class="actions"><button class="primary" onclick="loadAll()">Neu prüfen</button><button onclick="location.href='planer.html'">Zum Planer</button><button onclick="location.href='organisation-admin.html'">Organisation</button></div><div id="status" class="notice">Noch nicht geprüft.</div></section>
<div id="summary" class="notice" style="display:none"></div><section id="list" class="grid"></section>
<section class="audit"><h2>Bearbeitungshistorie</h2><p>Die letzten Änderungen aus dem Server-Eventprotokoll: wer, wann, was, Haus, Gruppe und Bereich.</p><div id="history" class="history-list">Noch nicht geladen.</div></section><pre id="debug" style="display:none"></pre>
<script>
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function slug(v){return String(v||'').trim().toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'gruppe';}
function fmtDate(v){if(!v)return 'noch nie';try{return new Date(v).toLocaleString('de-CH');}catch(_){return String(v)}}
function who(u){u=u||{};return u.email||u.name||u.id||u.source||'unbekannt'}
function setStatus(msg,kind=''){let e=document.getElementById('status');e.textContent=msg;e.className='notice '+kind}
async function fetchJson(url,opts){let r=await fetch(url,Object.assign({cache:'no-store'},opts||{}));let t=await r.text();let d={};try{d=t?JSON.parse(t):{}}catch(_){d={message:t}}if(!r.ok||d.ok===false)throw new Error(d.message||('HTTP '+r.status));return d}
function realUnits(site){return (Array.isArray(site.units)?site.units:[]).filter(u=>u&&!['pikett','hausdienstplan','nachtwache'].includes(String(u.type||'')))}
function ekey(siteId,groupKey,section){return slug(siteId)+'::'+slug(groupKey)+'::'+slug(section)}
function makeEventMap(events){let m={};(events||[]).forEach(ev=>{let k=ekey(ev.siteId,ev.groupKey,ev.section);(m[k]=m[k]||[]).push(ev)});return m}
function secLabel(s){return s==='state'?'Status':s==='employees'?'Mitarbeitende':s==='plan'?'Dienstplan':s==='wishes'?'Wünsche':s}
async function checkSection(site,unit,section,em){let siteId=site.id||site.name||'', groupKey=unit.plannerKey||unit.id||unit.name||'';try{let d=await fetchJson('/api/group-'+section+'?siteId='+encodeURIComponent(siteId)+'&groupKey='+encodeURIComponent(groupKey));let h=em[ekey(siteId,groupKey,section)]||[];return {section,ok:true,hasContent:!!d.hasContent,revision:d.revision||0,hash:d.hash||'',updatedAt:d.updatedAt||'',updatedBy:d.updatedBy||{},history:h}}catch(e){return {section,ok:false,message:e.message||String(e)}}}
async function checkUnit(site,unit,em){let out=[];for(const s of ['state','employees','plan','wishes'])out.push(await checkSection(site,unit,s,em));return out}
function renderSection(s){if(!s.ok)return '<div class="sec bad"><b>'+esc(secLabel(s.section))+'</b>Fehler<br>'+esc(s.message)+'</div>';let last=s.history&&s.history[0];let user=who(s.updatedBy)||who(last&&last.createdBy);let time=s.updatedAt||(last&&last.createdAt)||'';return '<div class="sec '+(s.hasContent?'ok':'empty')+'"><b>'+esc(secLabel(s.section))+'</b>'+(s.hasContent?'Daten vorhanden':'leer')+'<br>Rev '+esc(s.revision)+'<br><span style="font-size:10px;color:#667085">'+esc(s.hash||'ohne Hash')+'</span><div class="who">Zuletzt: '+esc(fmtDate(time))+'<br>Von: '+esc(user)+'<br>Events: '+esc((s.history||[]).length)+'</div></div>'}
function renderSite(site,urs){let units=realUnits(site),a=site.automaticFunctions||{},html='<article class="site"><h2>'+esc(site.name||site.id||'Standort')+'</h2><div class="meta"><span class="pill">'+esc(site.id||'ohne id')+'</span><span class="pill">'+esc(site.type||'')+'</span><span class="pill '+(units.length?'ok':'warn')+'">'+units.length+' Gruppen</span>';if(a.nachtwache)html+='<span class="pill">Nachtwache</span>';if(a.pikett)html+='<span class="pill">Pikett</span>';if(a.hausdienstplan)html+='<span class="pill">Haus-Dienstplan</span>';html+='</div>';if(!units.length)html+='<div class="notice warn">Keine Gruppen in der Organisation. Das ist erlaubt.</div>';units.forEach((u,i)=>{html+='<div class="unit"><div class="unit-title">'+esc(u.name||u.id)+'</div><div class="unit-sub">groupKey: '+esc(u.plannerKey||u.id||u.name)+' · unitId: '+esc(u.id||'')+'</div><div class="section-grid">'+(urs[i]||[]).map(renderSection).join('')+'</div></div>'});return html+'</article>'}
function renderHistory(events){let el=document.getElementById('history');if(!events.length){el.innerHTML='<div class="history-row"><div>Keine Events</div><div>Noch keine Gruppenänderungen gespeichert.</div><div></div></div>';return}el.innerHTML=events.slice(0,150).map(ev=>'<div class="history-row"><div class="history-time">'+esc(fmtDate(ev.createdAt))+'</div><div><b>'+esc(ev.type||'Änderung')+'</b><div class="history-meta">Haus: '+esc(ev.siteId)+' · Gruppe: '+esc(ev.groupKey)+' · Bereich: '+esc(secLabel(ev.section))+' · Rev '+esc(ev.revisionVorher||0)+' → '+esc(ev.revisionNachher||0)+'</div><div class="history-meta">Von: '+esc(who(ev.createdBy))+' · Backup: '+esc(ev.backupId||'kein Backup')+'</div></div><div><span class="chip">'+esc(ev.hashNachher||'ohne Hash')+'</span></div></div>').join('')}
async function loadAll(){setStatus('Organisation und Bearbeitungshistorie werden geladen …','warn');document.getElementById('list').innerHTML='';document.getElementById('summary').style.display='none';try{let [orgResp,evResp]=await Promise.all([fetchJson('/api/org-structure?ts='+Date.now()),fetchJson('/api/events?limit=500&ts='+Date.now()).catch(e=>({events:[],error:e.message}))]);let events=Array.isArray(evResp.events)?evResp.events:[];renderHistory(events);let em=makeEventMap(events),org=orgResp.organisationStructure||{},sites=Array.isArray(org.sites)?org.sites:[];let html=[],totalUnits=0,totalSections=0,filled=0,errors=0,debug={events:events.length,sites:[]};for(const site of sites){let units=realUnits(site),urs=[];totalUnits+=units.length;for(const u of units){let r=await checkUnit(site,u,em);urs.push(r);totalSections+=r.length;filled+=r.filter(x=>x.ok&&x.hasContent).length;errors+=r.filter(x=>!x.ok).length}html.push(renderSite(site,urs));debug.sites.push({siteId:site.id,siteName:site.name,units:units.map((u,i)=>({id:u.id,name:u.name,plannerKey:u.plannerKey,sections:urs[i]}))})}document.getElementById('list').innerHTML=html.join('');let s=document.getElementById('summary');s.style.display='block';s.className='notice '+(errors?'bad':'ok');s.textContent='Standorte: '+sites.length+' · Gruppen: '+totalUnits+' · Speicherbereiche: '+totalSections+' · mit Daten: '+filled+' · Events: '+events.length+' · Fehler: '+errors;document.getElementById('debug').style.display='block';document.getElementById('debug').textContent=JSON.stringify(debug,null,2);setStatus('Prüfung fertig. Änderungen sind pro Haus + Gruppe + Bereich sichtbar.','ok')}catch(e){setStatus('Fehler: '+(e.message||e),'bad')}}loadAll();
</script></main></body></html>
